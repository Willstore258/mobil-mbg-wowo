<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil MBG Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer" class="hidden">
            <div class="ui-box">Skor: <span id="ui-score">0</span></div>
            <div class="ui-box">Makanan: <span id="ui-food">0</span>/3</div>
            <div class="ui-box">Nyawa: <span id="ui-lives">❤️❤️❤️</span></div>
            <button id="btn-pause" class="ui-btn-small">⏸️</button>
        </div>

        <div id="main-menu" class="screen">
            <h1>Mobil MBG<br><span class="subtitle">Indonesia</span></h1>
            <div class="menu-card">
                <p class="high-score-text">High Score: <span id="menu-highscore">0</span></p>
                
                <label for="select-level">Pilih Kesulitan:</label>
                <select id="select-level">
                    <option value="easy">Mudah</option>
                    <option value="medium" selected>Sedang</option>
                    <option value="hard">Sulit</option>
                </select>

                <button id="btn-start" class="btn-main">MULAI PENGANTARAN</button>
                <button id="btn-audio-toggle" class="btn-secondary">Audio: ON</button>
            </div>
        </div>

        <div id="pause-screen" class="screen hidden backdrop">
            <h2>GAME PAUSED</h2>
            <button id="btn-resume" class="btn-main">LANJUTKAN</button>
            <button id="btn-restart-pause" class="btn-secondary">RESTART</button>
        </div>

        <div id="game-over-screen" class="screen hidden backdrop">
            <h2 class="danger-text">TUGAS SELESAI!</h2>
            <p>Mobilmu mengalami kendala di jalan.</p>
            <div class="menu-card">
                <p>Skor Akhir: <span id="final-score">0</span></p>
                <p>High Score Baru! 🎉</p>
                <button id="btn-restart" class="btn-main">MAIN LAGI</button>
            </div>
        </div>

        <div id="mobile-controls" class="hidden">
            <div class="dpad">
                <button id="ctrl-up" class="ctrl-btn">▲</button>
                <div class="dpad-horizontal">
                    <button id="ctrl-left" class="ctrl-btn">◀</button>
                    <button id="ctrl-right" class="ctrl-btn">▶</button>
                </div>
                <button id="ctrl-down" class="ctrl-btn">▼</button>
            </div>
            <button id="ctrl-horn" class="horn-btn">📯 Telolet</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
